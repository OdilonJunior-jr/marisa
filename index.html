<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbebee" />
  <meta name="description" content="Marisa Rodrigues Nails & Hair — Beleza no conforto da sua casa com agendamento pelo WhatsApp." />
  <title>Marisa Rodrigues | Nails & Hair</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(180deg, #fbebee 0%, #f9e5e8 48%, #fbf1f3 100%);
      --burgundy: #762d37;
      --burgundy-soft: #be5a6b;
      --muted: #6e6264;
      --whatsapp: #25d366;
      --verified-blue: #1da1f2;
      --card-bg: rgba(255, 255, 255, 0.9);
      --card-border: rgba(238, 176, 186, 0.42);
      --serif: "Cormorant Garamond", Georgia, serif;
      --sans: "Montserrat", Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      width: 100%;
      min-height: 100%;
      background: #fbebee;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      width: 100%;
      min-height: 100svh;
      background: var(--bg-gradient);
      color: var(--burgundy);
      font-family: var(--sans);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a { -webkit-tap-highlight-color: transparent; }
    img, svg { display: block; max-width: 100%; }

    .decor-lines {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100svh;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .decor-lines svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(14px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom));
    }

    .main-content {
      width: 100%;
      max-width: 395px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      isolation: isolate;
    }

    .brand-logo {
      width: clamp(150px, 42vw, 210px);
      height: auto;
      object-fit: contain;
      margin: 0 0 clamp(10px, 1.8vh, 16px);
      filter: drop-shadow(0 4px 9px rgba(118, 45, 55, 0.05));
    }

    .profile-circle {
      position: relative;
      width: clamp(122px, 34vw, 150px);
      aspect-ratio: 1 / 1;
      border-radius: 999px;
      background: #fff;
      padding: 4px;
      box-shadow: 0 10px 28px rgba(118, 45, 55, 0.13);
      margin-bottom: clamp(10px, 1.8vh, 14px);
      flex: 0 0 auto;
    }

    .profile-circle::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(238, 176, 186, 0.58);
      border-radius: inherit;
      pointer-events: none;
      z-index: 3;
    }

    .slider-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: inherit;
      background: #fbe5e9;
    }

    .slider-container img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0;
      transform: scale(1.015);
      animation: crossFade 12s infinite ease-in-out;
      will-change: opacity, transform;
    }

    .slider-container img:nth-child(1) { animation-delay: 0s; }
    .slider-container img:nth-child(2) { animation-delay: 3s; }
    .slider-container img:nth-child(3) { animation-delay: 6s; }
    .slider-container img:nth-child(4) { animation-delay: 9s; }

    @keyframes crossFade {
      0%, 21% { opacity: 1; transform: scale(1); }
      27%, 94% { opacity: 0; transform: scale(1.015); }
      100% { opacity: 1; transform: scale(1); }
    }

    .profile-verified-badge {
      position: absolute;
      right: 5px;
      bottom: 5px;
      width: clamp(27px, 7.4vw, 34px);
      height: clamp(27px, 7.4vw, 34px);
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      box-shadow: 0 4px 12px rgba(118, 45, 55, 0.2);
      z-index: 4;
      padding: 2px;
    }

    .headline-container {
      margin-bottom: clamp(13px, 2.4vh, 20px);
    }

    .headline-container h1 {
      font-family: var(--serif);
      font-size: clamp(24px, 6.1vw, 31px);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -0.015em;
      color: var(--burgundy);
    }

    .headline-container em {
      font-style: italic;
      font-weight: 600;
    }

    .script-heart {
      display: inline-block;
      vertical-align: middle;
      width: clamp(23px, 6vw, 29px);
      height: clamp(22px, 6vw, 28px);
      margin-left: 1px;
      transform: translateY(-2px);
    }

    .cta-button {
      width: 100%;
      min-height: 50px;
      border-radius: 13px;
      background: var(--burgundy-soft);
      color: #fff !important;
      text-decoration: none !important;
      display: grid;
      grid-template-columns: 34px 1fr 12px;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      box-shadow: 0 8px 20px rgba(190, 90, 107, 0.18);
      margin-bottom: clamp(10px, 1.8vh, 14px);
      transition: transform .18s ease, filter .18s ease;
      touch-action: manipulation;
    }

    .cta-button:active { transform: scale(0.985); }
    .cta-button:hover { filter: brightness(1.03); }

    .cta-icon-wrapper {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .cta-icon-wrapper svg { width: 26px; height: 26px; }

    .cta-button span {
      min-width: 0;
      color: #fff !important;
      text-decoration: none !important;
      text-align: center;
      font-size: clamp(13.2px, 3.55vw, 14.5px);
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .cta-arrow {
      width: 8px;
      height: 14px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .88;
    }

    .info-card,
    .double-services-card {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      box-shadow: 0 5px 16px rgba(118, 45, 55, 0.035);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .info-card {
      min-height: 68px;
      border-radius: 15px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      margin-bottom: clamp(10px, 1.8vh, 14px);
    }

    .home-icon {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
    }

    .home-icon svg {
      width: 44px;
      height: 44px;
      overflow: visible;
    }

    .info-card-text { min-width: 0; }

    .info-card-text h2 {
      font-family: var(--serif);
      font-size: clamp(16px, 4.15vw, 18px);
      line-height: 1.1;
      font-weight: 600;
      color: var(--burgundy);
      margin-bottom: 2px;
    }

    .info-card-text p {
      color: var(--muted);
      font-size: clamp(11.4px, 3vw, 12.4px);
      line-height: 1.25;
      font-weight: 500;
    }

    .ornament-separator {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: clamp(10px, 1.8vh, 14px);
    }

    .ornament-separator svg { width: 48px; height: 16px; }

    .double-services-card {
      border-radius: 17px;
      min-height: 86px;
      padding: 12px 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 18px minmax(0, 1fr);
      align-items: center;
      gap: 7px;
    }

    .sub-service-block {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
    }

    .sub-service-avatar {
      width: clamp(40px, 10vw, 46px);
      height: clamp(40px, 10vw, 46px);
      border-radius: 50%;
      object-fit: cover;
      flex: 0 0 auto;
    }

    .sub-service-info { min-width: 0; }

    .sub-service-info h3 {
      font-family: var(--serif);
      font-size: clamp(15px, 3.9vw, 17px);
      font-weight: 600;
      color: var(--burgundy);
      line-height: 1.05;
      margin-bottom: 3px;
    }

    .sub-service-info p {
      color: var(--muted);
      font-size: clamp(10.4px, 2.7vw, 11.4px);
      line-height: 1.22;
      font-weight: 500;
      overflow-wrap: anywhere;
    }

    .center-divider {
      height: 100%;
      min-height: 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .center-divider .line-segment {
      width: 1px;
      height: 18px;
      background: rgba(238, 176, 186, .42);
    }

    .center-divider svg {
      width: 8px;
      height: 8px;
      margin: 3px 0;
    }

    @media (max-width: 768px) {
      .decor-lines .desktop-only { display: none; }
      .page-wrapper {
        justify-content: flex-start;
        align-items: center;
      }
      .main-content { max-width: min(100%, 395px); }
    }

    @media (min-width: 769px) {
      .decor-lines .mobile-only { display: none; }
      .main-content { max-width: 410px; }
      .brand-logo { width: 210px; }
    }

    @media (max-width: 374px) {
      .page-wrapper { padding-left: 10px; padding-right: 10px; }
      .cta-button { grid-template-columns: 31px 1fr 9px; padding-inline: 10px; }
      .cta-icon-wrapper { width: 30px; height: 30px; }
      .double-services-card { gap: 5px; padding-inline: 8px; }
      .sub-service-block { gap: 6px; }
      .sub-service-avatar { width: 36px; height: 36px; }
    }

    @media (max-height: 720px) and (max-width: 480px) {
      .page-wrapper { padding-top: 10px; padding-bottom: 10px; }
      .brand-logo { width: clamp(134px, 38vw, 172px); margin-bottom: 8px; }
      .profile-circle { width: clamp(106px, 30vw, 126px); margin-bottom: 8px; }
      .headline-container { margin-bottom: 10px; }
      .headline-container h1 { font-size: clamp(21px, 5.7vw, 25px); line-height: 1.04; }
      .cta-button { min-height: 46px; margin-bottom: 8px; }
      .info-card { min-height: 60px; padding: 8px 12px; margin-bottom: 8px; }
      .home-icon { width: 40px; height: 40px; }
      .ornament-separator { margin-bottom: 8px; }
      .double-services-card { min-height: 76px; padding-top: 9px; padding-bottom: 9px; }
      .sub-service-avatar { width: 38px; height: 38px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slider-container img { animation: none !important; opacity: 0; transform: none; }
      .slider-container img:first-child { opacity: 1 !important; }
      .cta-button { transition: none; }
    }
  </style>
</head>

<body>
  <div class="decor-lines" aria-hidden="true">
    <svg class="desktop-only" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M-50 220C180 280 220 480 80 680C-20 820-100 850-150 900" stroke="#eeb0ba" stroke-width="1.2" stroke-linecap="round" opacity="0.58"/>
      <path d="M1500 80C1300 160 1220 380 1340 560C1400 650 1460 720 1500 780" stroke="#eeb0ba" stroke-width="1.2" stroke-linecap="round" opacity="0.58"/>
    </svg>

    <svg class="mobile-only" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M-24 176C65 220 84 342 22 462C-18 540-40 583-62 626" stroke="#eeb0ba" stroke-width="1" stroke-linecap="round" opacity="0.52"/>
      <path d="M414 96C338 148 318 263 368 384C388 432 406 474 426 518" stroke="#eeb0ba" stroke-width="1" stroke-linecap="round" opacity="0.52"/>
    </svg>
  </div>

  <div class="page-wrapper">
    <main class="main-content">
      <img class="brand-logo" src="imagens/logo-marisa-rodrigues.webp" alt="Marisa Rodrigues Nails & Hair" />

      <section class="profile-circle" aria-label="Fotos da profissional">
        <div class="slider-container">
          <img src="imagens/marisa-1.webp" alt="Marisa Rodrigues" />
          <img src="imagens/marisa-2.webp" alt="Marisa Rodrigues mostrando unhas" />
          <img src="imagens/marisa-3.webp" alt="Marisa Rodrigues indicando serviço" />
          <img src="imagens/marisa-4.webp" alt="Marisa Rodrigues sentada" />
        </div>

        <div class="profile-verified-badge" aria-label="Selo verificado">
          <svg viewBox="0 0 24 24" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.5 12l-2.4 2.7.3 3.6-3.5.8-1.8 3.1-3.1-1.5-3.1 1.5-1.8-3.1-3.5-.8.3-3.6L1.5 12l2.4-2.7-.3-3.6 3.5-.8 1.8-3.1L12 3.3l3.1-1.5 1.8 3.1 3.5.8-.3 3.6L22.5 12z" fill="var(--verified-blue)"/>
            <path d="M10.15 15.65 6.9 12.4l-1.35 1.35 4.6 4.6 8.55-8.55-1.35-1.35-7.2 7.2z" fill="#fff"/>
          </svg>
        </div>
      </section>

      <section class="headline-container">
        <h1>Beleza no conforto<br>da <em>sua casa</em>
          <svg class="script-heart" viewBox="0 0 46 42" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M14 18c-3-6 3-10 8-5 5-5 11-1 8 5-4 6-8 11-8 11s-4-5-8-11Z" stroke="#be5a6b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M28 20.5c2 1 5 1.5 8 .5 3-1 5-3 4-5" stroke="#be5a6b" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </h1>
      </section>

      <a class="cta-button" href="https://wa.me/5500000000000?text=Ol%C3%A1%2C%20Marisa%21%20Vim%20pelo%20link%20da%20bio%20e%20quero%20agendar%20um%20atendimento." target="_blank" rel="noopener" aria-label="Agendar pelo WhatsApp">
        <span class="cta-icon-wrapper" aria-hidden="true">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="15" fill="var(--whatsapp)"/>
            <path fill="#fff" d="M23.5 18.9c-.4-.2-2.3-1.1-2.7-1.3-.4-.1-.6-.2-.9.2-.3.4-1 1.3-1.2 1.5-.2.3-.5.3-.9.1-.4-.2-1.6-.6-3.1-1.9-1.1-1-1.9-2.2-2.1-2.6-.2-.4 0-.6.2-.8l.6-.7c.2-.2.3-.4.4-.7.1-.3 0-.5 0-.7-.1-.2-.9-2.1-1.2-2.9-.3-.7-.6-.6-.9-.6h-.8c-.3 0-.7.1-1 .5-.4.4-1.3 1.3-1.3 3.1s1.3 3.6 1.5 3.8c.2.3 2.6 4 6.3 5.6.9.4 1.6.6 2.1.8.9.3 1.7.3 2.4.2.7-.1 2.3-.9 2.6-1.8.3-.9.3-1.7.2-1.8-.1-.2-.3-.3-.7-.5Z"/>
          </svg>
        </span>
        <span>Agendar pelo WhatsApp</span>
        <svg class="cta-arrow" viewBox="0 0 8 14" aria-hidden="true">
          <path d="M1 13 7 7 1 1" />
        </svg>
      </a>

      <section class="info-card" aria-label="Atendimento domiciliar">
        <div class="home-icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="30" fill="#fff5f7" stroke="#eeb0ba" stroke-width="1.4"/>
            <path d="M18 33.5 32 21l14 12.5" fill="none" stroke="#8f3b47" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 32v15h20V32" fill="none" stroke="#8f3b47" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M29 47v-8h6v8" fill="none" stroke="#8f3b47" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="info-card-text">
          <h2>Atendimento domiciliar</h2>
          <p>Beleza e praticidade no conforto da sua casa.</p>
        </div>
      </section>

      <div class="ornament-separator" aria-hidden="true">
        <svg viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 12h18M30 12h18" stroke="#eeb0ba" stroke-width="1" stroke-linecap="round"/>
          <circle cx="24" cy="12" r="2" fill="#eeb0ba"/>
        </svg>
      </div>

      <section class="double-services-card" aria-label="Serviços principais">
        <article class="sub-service-block">
          <img class="sub-service-avatar" src="imagens/icon-unhas.webp" alt="Ícone Unhas" />
          <div class="sub-service-info">
            <h3>Unhas</h3>
            <p>Tradicional,<br>Alongamento em gel.</p>
          </div>
        </article>

        <div class="center-divider" aria-hidden="true">
          <div class="line-segment"></div>
          <svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">
            <circle cx="5" cy="5" r="1.7" fill="#eeb0ba"/>
          </svg>
          <div class="line-segment"></div>
        </div>

        <article class="sub-service-block">
          <img class="sub-service-avatar" src="imagens/icon-cabelo.webp" alt="Ícone Cabelo" />
          <div class="sub-service-info">
            <h3>Cabelo</h3>
            <p>Progressiva,<br>Tintura,<br>Escova.</p>
          </div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
