<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#fbebee" />
  <meta name="description" content="Marisa Rodrigues Nails & Hair — Atendimento domiciliar com agendamento pelo WhatsApp." />
  <title>Marisa Rodrigues | Nails & Hair</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-gradient: linear-gradient(180deg, #fbebee 0%, #f9e5e8 50%, #fbf1f3 100%);
      --burgundy: #762d37;
      --burgundy-light: #8f3b47;
      --text-muted: #6e6264;
      --btn-bg: #be5a6b;
      --verified-blue: #1da1f2;
      --card-bg: rgba(255, 255, 255, 0.88);
      --card-border: rgba(238, 176, 186, 0.35);
      --serif: "Cormorant Garamond", Georgia, serif;
      --sans: "Montserrat", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: var(--bg-gradient);
      font-family: var(--sans);
      color: var(--burgundy);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Linhas Decorativas de Fundo */
    .decor-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .decor-lines svg {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    /* Wrapper Principal Otimizado */
    .page-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(10px, 2vw, 24px) 16px;
    }

    .main-content {
      width: 100%;
      max-width: clamp(320px, 85vw, 395px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Logo Superior */
    .brand-logo {
      width: clamp(140px, 38vw, 195px);
      height: auto;
      margin-bottom: clamp(10px, 2.5vh, 18px);
      object-fit: contain;
    }

    /* Círculo de Imagem Ampliado */
    .profile-circle {
      position: relative;
      width: clamp(115px, 32vw, 142px);
      height: clamp(115px, 32vw, 142px);
      border-radius: 50%;
      background: #ffffff;
      padding: 4px;
      box-shadow: 0 10px 26px rgba(118, 45, 55, 0.12);
      margin-bottom: clamp(8px, 2vh, 14px);
    }

    .profile-circle::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(238, 176, 186, 0.5);
      pointer-events: none;
    }

    .slider-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      border-radius: 50%;
    }

    .slider-container img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0;
      transform: scale(1.03);
      animation: crossFadeSlider 12s infinite ease-in-out;
    }

    .slider-container img:nth-child(1) { animation-delay: 0s; }
    .slider-container img:nth-child(2) { animation-delay: 3s; }
    .slider-container img:nth-child(3) { animation-delay: 6s; }
    .slider-container img:nth-child(4) { animation-delay: 9s; }

    @keyframes crossFadeSlider {
      0%, 20% { opacity: 1; transform: scale(1); }
      25%, 95% { opacity: 0; transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Selo de Verificado Profissional Correto e Alinhado */
    .verified-badge-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: clamp(10px, 2.5vh, 18px);
    }

    .verified-name {
      font-size: clamp(13px, 3.5vw, 14.5px);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--burgundy);
    }

    .verified-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
      flex-shrink: 0;
    }

    /* Headline / Título Compacto */
    .headline-container {
      margin-bottom: clamp(14px, 3.5vh, 22px);
    }

    .headline-container h1 {
      font-family: var(--serif);
      font-size: clamp(22px, 5.8vw, 28px);
      font-weight: 500;
      line-height: 1.16;
      color: var(--burgundy);
      letter-spacing: -0.01em;
      position: relative;
      display: inline-block;
    }

    .headline-container h1 em {
      font-style: italic;
      font-weight: 600;
    }

    .script-heart {
      display: inline-block;
      vertical-align: middle;
      width: clamp(22px, 6vw, 28px);
      height: clamp(22px, 6vw, 28px);
      margin-left: 2px;
      transform: translateY(-2px);
    }

    .headline-container p {
      font-family: var(--sans);
      font-size: clamp(12px, 3vw, 13.5px);
      color: var(--text-muted);
      line-height: 1.35;
      font-weight: 500;
      margin-top: 4px;
    }

    /* Botão do WhatsApp Premium Totalmente Limpo (Sem Sublinhado e Sem Bold) */
    .cta-button {
      width: 100%;
      height: clamp(44px, 10.5vw, 50px);
      background-color: var(--btn-bg);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      color: #ffffff !important;
      text-decoration: none !important;
      box-shadow: 0 6px 18px rgba(190, 90, 107, 0.18);
      margin-bottom: clamp(10px, 2vh, 14px);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .cta-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .cta-icon-wrapper {
      width: clamp(26px, 7vw, 30px);
      height: clamp(26px, 7vw, 30px);
      background-color: #ffffff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .cta-icon-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .cta-button span {
      font-size: clamp(13px, 3.4vw, 14px);
      font-weight: 400;
      letter-spacing: -0.01em;
      flex-grow: 1;
      text-align: center;
      margin-right: 4px;
      text-decoration: none !important;
      color: #ffffff !important;
    }

    .cta-arrow {
      width: 6px;
      height: 11px;
      fill: none;
      stroke: #ffffff;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.85;
    }

    /* Card 1: Atendimento Domiciliar */
    .info-card {
      width: 100%;
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: clamp(8px, 2.5vw, 11px) clamp(12px, 3vw, 15px);
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 15px rgba(118, 45, 55, 0.015);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      margin-bottom: clamp(10px, 2vh, 14px);
      text-align: left;
    }

    .info-card-icon-circle {
      width: clamp(34px, 8vw, 40px);
      height: clamp(34px, 8vw, 40px);
      background: transparent;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: none;
    }

    .info-card-icon-circle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .info-card-text h2 {
      font-family: var(--serif);
      font-size: clamp(15px, 3.8vw, 17px);
      font-weight: 600;
      color: var(--burgundy);
      margin-bottom: 0px;
    }

    .info-card-text p {
      font-size: clamp(11px, 2.5vw, 12px);
      color: var(--text-muted);
      line-height: 1.3;
      font-weight: 500;
    }

    /* Separador Slim */
    .ornament-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-bottom: clamp(10px, 2vh, 14px);
    }

    .ornament-separator svg {
      width: 20px;
      height: 8px;
    }

    /* Card Duplo de Serviços */
    .double-services-card {
      width: 100%;
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: clamp(10px, 3vw, 14px) clamp(8px, 1.8vw, 12px);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      box-shadow: 0 4px 15px rgba(118, 45, 55, 0.015);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .sub-service-block {
      display: flex;
      align-items: center;
      gap: clamp(5px, 1.5vw, 8px);
      text-align: left;
    }

    .sub-service-avatar {
      width: clamp(30px, 7.5vw, 35px);
      height: clamp(30px, 7.5vw, 35px);
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .sub-service-info h3 {
      font-family: var(--serif);
      font-size: clamp(13.5px, 3.5vw, 15px);
      font-weight: 600;
      color: var(--burgundy);
      margin-bottom: 1px;
    }

    .sub-service-info p {
      font-size: clamp(10px, 2.2vw, 11px);
      color: var(--text-muted);
      line-height: 1.25;
      font-weight: 500;
    }

    .center-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 0 clamp(2px, 1vw, 6px);
    }

    .center-divider .line-segment {
      width: 1px;
      height: clamp(10px, 2.5vw, 15px);
      background-color: rgba(238, 176, 186, 0.3);
    }

    .center-divider svg {
      width: 6px;
      height: 6px;
      margin: 2px 0;
    }

    @media (max-width: 768px) {
      .decor-lines .desktop-only { display: none; }
    }
    @media (min-width: 769px) {
      .decor-lines .mobile-only { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .slider-container img { animation: none !important; opacity: 0; }
      .slider-container img:first-child { opacity: 1 !important; transform: scale(1); }
    }
  </style>
</head>
